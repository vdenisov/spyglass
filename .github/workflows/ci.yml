name: CI

# Verifies the OSS build against both supported Spring Boot / springdoc majors:
#   - the default leg: Spring Boot 3.5 / springdoc 2.x
#   - the "boot4" leg: Spring Boot 4.x / springdoc 3.x
# Each leg compiles every module and runs the unit specs plus the Playwright "*AE" browser specs.

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Supersede in-flight runs for the same ref (e.g. a force-push to an open PR) instead of
# letting them pile up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.leg.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        leg:
          - { name: "Boot 3.5 / springdoc 2", profile: "" }
          - { name: "Boot 4 / springdoc 3", profile: "-Pboot4" }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Compile every module (no tests yet) so the reactor artifacts and the Playwright dependency are
      # resolved before the browser install and the test run.
      - name: Build (skip tests)
        run: mvn -B ${{ matrix.leg.profile }} -DskipTests clean install

      # Cache the downloaded Chromium across runs. The browser revision tracks the Playwright version
      # (parent-managed in pom.xml), so the pom hash is a safe cache key — a Playwright bump invalidates
      # it. OS libraries (--with-deps) are reinstalled each run regardless; only the browser is cached.
      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pom.xml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      # The "*AE" specs drive a real headless Chromium. Pre-install it (and its OS libraries) via the
      # bundled Playwright CLI; the Playwright version is parent-managed, so the same browser serves both
      # legs. Run it from the test-support module, which carries playwright as a compile-scope dependency.
      - name: Install Playwright browser + OS dependencies
        run: >
          mvn -B -pl spyglass-spring-test-support
          org.codehaus.mojo:exec-maven-plugin:3.5.1:java
          -Dexec.mainClass=com.microsoft.playwright.CLI
          -Dexec.args="install --with-deps chromium"
          -Dexec.cleanupDaemonThreads=false

      # Unit specs (surefire) + the "*AE" browser specs (failsafe, via the apidocs-tests profile) in one
      # invocation — the profile only widens the failsafe includes, surefire still runs the unit specs.
      - name: Verify (unit + browser specs)
        run: mvn -B ${{ matrix.leg.profile }} verify -Papidocs-tests
