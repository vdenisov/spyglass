<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spyglass social card</title>
<style>
  /* ----------------------------------------------------------------------
     Card is 1280x670 = the universal OG ratio 1.91:1 (canonical 1200x630),
     which Facebook / X / LinkedIn / Discord all expect and GitHub accepts.
     To export cleanly (avoids OS-scaling / browser-zoom size surprises):
       - DevTools (F12) -> select the <div class="card"> element ->
         right-click -> "Capture node screenshot". Grabs the exact element
         bounds at your device pixel ratio (e.g. 1600x838 at 125% OS scale).
       - Any 1.91:1 PNG >= ~1200px wide works; bigger is just sharper. Do NOT
         stack browser zoom on top of OS scaling -- it lands on odd, non-1.91 sizes.
       - Upload at: repo Settings -> Social preview.
     Keep important text inside the 64px padding (some surfaces crop edges).
     -------------------------------------------------------------------- */
  :root {
    --bg0: #0b1220;
    --bg1: #0d1117;
    --ink: #e6edf3;
    --body: #c7d2e0;       /* readable body text on dark — brighter than --muted */
    --muted: #8b9bb0;
    --accent: #34d4c4;     /* spyglass teal */
    --accent-2: #38bdf8;
    --line: rgba(255,255,255,.08);
    --mono: ui-monospace, "SF Mono", "Cascadia Code", Consolas, "Liberation Mono", monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1c2128;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .card {
    position: relative;
    width: 1280px; height: 670px;
    background:
      radial-gradient(1100px 600px at 78% -10%, rgba(56,189,248,.10), transparent 60%),
      radial-gradient(900px 500px at 0% 110%, rgba(52,212,196,.10), transparent 55%),
      linear-gradient(135deg, var(--bg0), var(--bg1));
    color: var(--ink);
    overflow: hidden;
    display: grid;
    grid-template-columns: 1fr 560px;
  }

  /* ---- Left: message ---- */
  .left { padding: 64px; display: flex; flex-direction: column; justify-content: space-between; }

  .brand { display: flex; align-items: center; gap: 14px; }
  .brand .name { font-size: 32px; font-weight: 700; letter-spacing: .2px; }

  .eyebrow {
    font-size: 18px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--accent); margin-bottom: 18px;
  }
  /* HEADLINE — punchy / alternative-to (active). The descriptive variant is
     kept commented in the markup below if you ever want to swap back. */
  .punchy { font-size: 80px; line-height: 1.0; font-weight: 800; letter-spacing: -2.5px; }
  .punchy .strike { color: var(--muted); text-decoration: line-through; text-decoration-color: rgba(255,90,90,.8); text-decoration-thickness: 5px; }
  h1 {
    font-size: 56px; line-height: 1.08; font-weight: 800; letter-spacing: -1px;
    max-width: 600px;
  }
  h1 .hl { color: var(--accent); }

  .sub { margin-top: 22px; font-size: 24px; line-height: 1.45; color: var(--body); max-width: 540px; }

  .trust { display: flex; align-items: center; gap: 12px; font-size: 19px; font-weight: 500; color: var(--body); }
  .trust .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--muted); opacity: .6; }
  .trust b { color: var(--ink); font-weight: 600; }

  /* ---- Right: CSS-rendered explorer motif (vector, not a screenshot —
     crisp at any size, never crops wrong, never goes stale) ---- */
  .right { position: relative; }
  .window {
    position: absolute; top: 74px; left: 40px; right: -16px; bottom: 62px;
    display: flex; flex-direction: column;
    border: 1px solid var(--line); border-radius: 14px;
    background: #0d1117;
    box-shadow: -26px 30px 80px rgba(0,0,0,.5);
    overflow: hidden;
  }
  .window .bar {
    flex: 0 0 40px; display: flex; align-items: center; gap: 8px; padding: 0 16px;
    background: #161b22; border-bottom: 1px solid var(--line);
  }
  .window .bar i { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
  .window .bar i:nth-child(1){ background:#ff5f57 } .window .bar i:nth-child(2){ background:#febc2e } .window .bar i:nth-child(3){ background:#28c840 }
  .window .bar .url { margin-left: 14px; font-size: 14px; color: var(--muted); font-family: var(--mono); }

  /* actions pinned low via margin-top:auto so Send sits near the bottom and the
     form fills the vertical space instead of clustering at the top. */
  .panel { flex: 1 1 auto; padding: 30px 32px; display: flex; flex-direction: column; gap: 20px; }
  .op { display: flex; align-items: center; gap: 12px; }
  .method { font-size: 16px; font-weight: 700; letter-spacing: .5px; color: #fff; padding: 5px 12px; border-radius: 7px; background: #2f7bf6; }
  .path { font-family: var(--mono); font-size: 22px; font-weight: 600; color: var(--ink); }

  .tabs { display: flex; gap: 28px; border-bottom: 1px solid var(--line); }
  .tab { font-size: 18px; color: var(--muted); padding-bottom: 11px; }
  .tab.on { color: #58a6ff; border-bottom: 2px solid #58a6ff; font-weight: 600; }

  .section { display: flex; align-items: center; gap: 12px; }
  .section h4 { font-size: 20px; font-weight: 700; color: var(--ink); }
  .badge { font-size: 14px; font-weight: 700; letter-spacing: .5px; color: #adbac7; background: #21262d; border: 1px solid var(--line); padding: 3px 10px; border-radius: 6px; }

  /* form grid: [label] [control fills width] [24px trailing]. The fixed trailing
     column keeps every input the same width (left AND right edges aligned),
     whether or not its row carries a checkbox. */
  .form { display: grid; grid-template-columns: auto 1fr 24px; column-gap: 16px; row-gap: 20px; align-items: center; }
  .form label { font-family: var(--mono); font-size: 18px; color: var(--ink); }
  .control { height: 44px; display: inline-flex; align-items: center; gap: 16px; padding: 0 15px;
    background: #1c2128; border: 1px solid #30363d; border-radius: 8px; color: var(--ink); font-size: 18px; }
  .control.input { width: 100%; }
  .control.select { justify-self: start; }
  .control .chev { color: var(--muted); font-size: 13px; }
  .check { width: 24px; height: 24px; border-radius: 5px; background: #2f7bf6; color: #fff;
    display: inline-flex; align-items: center; justify-content: center; font-size: 15px; }

  .actions { display: flex; gap: 12px; margin-top: auto; }
  .btn { font-size: 17px; font-weight: 600; padding: 11px 20px; border-radius: 8px; }
  .btn.send { background: #2ea043; color: #fff; }
  .btn.ghost { background: transparent; border: 1px solid #30363d; color: var(--ink); }
</style>
</head>
<body>
  <div class="card">
    <div class="left">
      <div class="brand">
        <span class="name">Spyglass</span>
      </div>

      <div>
        <div class="eyebrow">For Spring Boot</div>
        <div class="punchy"><span class="strike">Swagger&nbsp;UI</span>,<br>replaced.</div>
        <!-- Descriptive alternative (swap back if you ever want it):
        <h1>The <span class="hl">no-build</span> OpenAPI explorer you embed in your own service.</h1>
        -->
        <p class="sub">An embeddable, no-build OpenAPI explorer for Spring Boot. One dependency, no npm.</p>
      </div>

      <div class="trust">
        <span>Spring&nbsp;MVC&nbsp;+&nbsp;WebFlux</span><span class="dot"></span>
        <span>Maven&nbsp;Central</span><span class="dot"></span>
        <span>MIT</span>
      </div>
    </div>

    <div class="right">
      <div class="window">
        <div class="bar">
          <i></i><i></i><i></i>
          <span class="url">/apidocs</span>
        </div>
        <div class="panel">
          <div class="op">
            <span class="method">POST</span>
            <span class="path">/apidocs-demo/shapes</span>
          </div>
          <div class="tabs">
            <span class="tab on">Try it out</span>
            <span class="tab">Schema</span>
          </div>
          <div class="section">
            <h4>Request body</h4>
            <span class="badge">ONEOF</span>
          </div>
          <div class="form">
            <label>Variant</label>
            <span class="control select">circle <span class="chev">▼</span></span>
            <span></span>

            <label>kind</label>
            <span class="control input">circle</span>
            <span class="check">✓</span>

            <label>radius</label>
            <span class="control input">12</span>
            <span></span>
          </div>
          <div class="actions">
            <span class="btn send">Send</span>
            <span class="btn ghost">Copy as cURL</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
